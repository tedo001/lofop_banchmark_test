name: benchmark

# Runs the LOFOP benchmark harness on every push, on pull requests, and weekly,
# so size/speed/accuracy drift in LOFOP is caught early. Results are uploaded as
# a build artifact for inspection.

on:
  push:
    branches: [main, tedo]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install CPU PyTorch
        run: python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install the harness (installs the published lofop from PyPI)
        run: python -m pip install -r requirements.txt
      - name: Run benchmarks (CPU regression guard; batch 1 to stay fast)
        run: >
          python run_benchmarks.py --device cpu --size 640 --batch-sizes 1
          --variant n --epochs 20 --acc-size 96
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: results/
